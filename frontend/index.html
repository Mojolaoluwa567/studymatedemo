<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logoss.png" />
    <title>StudyMate — Study smarter, not longer</title>
    <!-- Google Identity Services SDK for OAuth sign-in -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        if (!theme) theme = "dark";
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      /* First-paint loading screen, shown until React mounts and removes
         #initial-loader. Colors are hardcoded (not CSS vars) since this
         renders before any stylesheet loads - matches dark mode default
         since that's the app's default theme above. */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        z-index: 9999;
      }
      html:not(.dark) #initial-loader {
        background: #f8fafc;
      }
      #initial-loader .mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #6366f1;
        animation: initial-loader-pulse 1.1s ease-in-out infinite;
      }
      @keyframes initial-loader-pulse {
        0%,
        100% {
          opacity: 0.5;
          transform: scale(0.92);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader"><div class="mark"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
